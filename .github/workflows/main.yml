name: 📦 build and publish conda package to Anaconda repository

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:

  push:
    branches:
      - master
      - develop

  pull_request:
  release:
    types: [published]

jobs:

  build_and_publish:

    name: deploy package (noarch)
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: defaults

      - name: Build package
        run: |
          conda install conda-build
          conda-build .conda --output-folder out

      - name: Publish package for release
        if: (github.event_name == 'release' && github.event.action == 'published')
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_UPLOAD_TOKEN }}
        run: |
          conda install anaconda-client
          anaconda upload out/*/*.tar.bz2

      - name: Publish development package only for the development branch
        if: (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_UPLOAD_TOKEN }}
        run: |
          conda install anaconda-client
          anaconda upload -l dev out/*/*.tar.bz2
